<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>🚒 FFW Quiz</title>
  <style>
    /* === DESIGN TOKENS === */
    :root {
      --c-primary: #C41E3A;
      --c-bg: #FAFAFA;
      --c-text: #1A1A2E;
      --c-correct: #2D6A4F;
      --c-wrong: #C41E3A;
      --c-accent: #F4A261;
      --c-card: #FFFFFF;
      --c-muted: #6B7280;
      --c-border: #E5E7EB;

      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      --fs-title: 1.5rem;
      --fs-question: 1.125rem;
      --fs-body: 1rem;
      --fs-small: 0.875rem;

      --radius: 12px;
      --shadow: 0 2px 8px rgba(0,0,0,0.08);
      --transition: 0.2s ease;

      --match-color-1: #3B82F6;
      --match-color-2: #8B5CF6;
      --match-color-3: #14B8A6;
      --match-color-4: #F59E0B;
    }

    /* === RESET & BASE === */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font);
      background: var(--c-bg);
      color: var(--c-text);
      font-size: var(--fs-body);
      line-height: 1.5;
      overscroll-behavior: none;
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
    }

    #app {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
      min-height: 100dvh;
      position: relative;
    }

    /* === SCREEN === */
    .screen {
      display: none;
      flex-direction: column;
      gap: 16px;
      animation: fadeIn 0.3s ease;
      min-height: calc(100dvh - 32px);
    }

    .screen.active {
      display: flex;
    }

    /* === CARD === */
    .card {
      background: var(--c-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 20px;
    }

    /* === BUTTONS === */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      width: 100%;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font);
      font-size: var(--fs-body);
      font-weight: 600;
      cursor: pointer;
      touch-action: manipulation;
      transition: transform var(--transition), opacity var(--transition), background var(--transition);
      text-align: center;
      padding: 12px 16px;
      line-height: 1.3;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn--primary {
      background: var(--c-primary);
      color: #FFFFFF;
    }

    .btn--primary:active {
      background: #A3172F;
    }

    .btn--secondary {
      background: transparent;
      color: var(--c-primary);
      border: 2px solid var(--c-primary);
    }

    .btn--secondary:active {
      background: rgba(196,30,58,0.06);
    }

    .btn--ghost {
      background: transparent;
      color: var(--c-muted);
      font-weight: 500;
      font-size: var(--fs-small);
    }

    .btn--ghost:active {
      color: var(--c-text);
    }

    /* Difficulty toggle group */
    .difficulty-group {
      display: flex;
      gap: 8px;
    }

    .btn--difficulty {
      flex: 1;
      min-height: 44px;
      background: var(--c-card);
      color: var(--c-text);
      border: 2px solid var(--c-border);
      font-size: var(--fs-small);
      font-weight: 600;
      border-radius: var(--radius);
      touch-action: manipulation;
      cursor: pointer;
      transition: all var(--transition);
      padding: 8px 4px;
      text-align: center;
      font-family: var(--font);
    }

    .btn--difficulty.active {
      background: var(--c-primary);
      color: #FFFFFF;
      border-color: var(--c-primary);
    }

    .btn--difficulty:active {
      transform: scale(0.97);
    }

    /* === MC BUTTONS === */
    .mc-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .mc-btn {
      display: flex;
      align-items: center;
      width: 100%;
      min-height: 48px;
      padding: 14px 16px;
      border: 2px solid var(--c-border);
      border-radius: var(--radius);
      background: var(--c-card);
      color: var(--c-text);
      font-family: var(--font);
      font-size: var(--fs-body);
      font-weight: 500;
      cursor: pointer;
      touch-action: manipulation;
      transition: all var(--transition);
      text-align: left;
      line-height: 1.4;
    }

    .mc-btn:active:not(.mc-btn--correct):not(.mc-btn--wrong):not(.mc-btn--dimmed) {
      transform: scale(0.98);
      border-color: var(--c-primary);
    }

    .mc-btn--correct {
      background: #D4EDDA;
      border-color: var(--c-correct);
      color: var(--c-correct);
      font-weight: 700;
      animation: pulse 0.3s ease;
    }

    .mc-btn--wrong {
      background: #F8D7DA;
      border-color: var(--c-wrong);
      color: var(--c-wrong);
      font-weight: 700;
      animation: shake 0.4s ease;
    }

    .mc-btn--dimmed {
      opacity: 0.45;
      pointer-events: none;
    }

    /* === MATCH === */
    .match-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .match-col {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .match-item {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 10px 8px;
      border: 2px solid var(--c-border);
      border-radius: var(--radius);
      background: var(--c-card);
      color: var(--c-text);
      font-family: var(--font);
      font-size: var(--fs-small);
      font-weight: 500;
      cursor: pointer;
      touch-action: manipulation;
      transition: all var(--transition);
      text-align: center;
      line-height: 1.3;
      word-break: break-word;
    }

    .match-item:active:not(.match-item--paired) {
      transform: scale(0.97);
    }

    .match-item--selected {
      border-color: var(--c-primary);
      background: rgba(196,30,58,0.08);
      box-shadow: 0 0 0 2px rgba(196,30,58,0.2);
    }

    .match-item--paired {
      color: #FFFFFF;
      font-weight: 700;
      border-color: transparent;
      cursor: pointer;
      transition: background-color 0.2s ease, border-color 0.2s ease, opacity 0.2s ease, color 0.2s ease;
    }

    .match-item--pair-1 { background: var(--match-color-1); }
    .match-item--pair-2 { background: var(--match-color-2); }
    .match-item--pair-3 { background: var(--match-color-3); }
    .match-item--pair-4 { background: var(--match-color-4); }

    .match-item--correct-pair {
      box-shadow: 0 0 0 3px var(--c-correct);
    }

    .match-item--wrong-pair {
      box-shadow: 0 0 0 3px var(--c-wrong);
      animation: shake 0.4s ease;
    }

    .match-submit-wrap {
      margin-top: 8px;
    }

    /* === PROGRESS BAR === */
    .progress-bar {
      width: 100%;
      height: 6px;
      background: var(--c-border);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar__fill {
      height: 100%;
      background: var(--c-primary);
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: var(--fs-small);
      color: var(--c-muted);
    }

    /* === BADGE === */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .badge--leicht { background: #D4EDDA; color: var(--c-correct); }
    .badge--mittel { background: #FFF3CD; color: #856404; }
    .badge--schwer { background: #F8D7DA; color: var(--c-wrong); }

    /* === READINESS RING === */
    .readiness-ring-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      position: relative;
    }

    .readiness-ring {
      width: 120px;
      height: 120px;
    }

    .readiness-ring__track {
      fill: none;
      stroke: var(--c-border);
      stroke-width: 8;
    }

    .readiness-ring__progress {
      fill: none;
      stroke: var(--c-primary);
      stroke-width: 8;
      stroke-linecap: round;
      transition: stroke-dashoffset 1.5s ease-out;
    }

    .readiness-ring__text {
      font-family: var(--font);
      font-size: 1.4rem;
      font-weight: 700;
      fill: var(--c-text);
    }

    .readiness-ring__label {
      font-size: var(--fs-small);
      color: var(--c-muted);
      font-weight: 500;
    }

    .readiness-badge {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.6rem;
      line-height: 1;
      pointer-events: none;
      z-index: 1;
    }

    .badge-celebration {
      text-align: center;
      font-size: 0.95rem;
      color: var(--c-primary);
      font-weight: 600;
      margin-top: 8px;
      animation: messageBounce 0.5s ease-out both;
    }

    /* === FEEDBACK CARD === */
    .feedback-card {
      text-align: center;
    }

    .feedback-icon {
      font-size: 3rem;
      margin-bottom: 8px;
    }

    .feedback-result {
      font-size: var(--fs-title);
      font-weight: 700;
      margin-bottom: 4px;
    }

    .feedback-result--correct { color: var(--c-correct); }
    .feedback-result--wrong { color: var(--c-wrong); }

    .feedback-explanation {
      font-size: var(--fs-body);
      color: var(--c-text);
      line-height: 1.6;
      text-align: left;
      margin-top: 12px;
      padding: 16px;
      background: var(--c-bg);
      border-radius: var(--radius);
    }

    .feedback-correct-answer {
      margin-top: 12px;
      padding: 12px 16px;
      background: #D4EDDA;
      border-radius: var(--radius);
      color: var(--c-correct);
      font-weight: 600;
      text-align: left;
      font-size: var(--fs-small);
    }

    /* === RESULTS === */
    .results-score {
      font-size: 2.5rem;
      font-weight: 800;
      text-align: center;
      color: var(--c-primary);
    }

    .results-comment {
      text-align: center;
      font-size: var(--fs-question);
      font-weight: 600;
      color: var(--c-text);
    }

    .summary-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .summary-item {
      border: 1px solid var(--c-border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .summary-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      cursor: pointer;
      touch-action: manipulation;
      background: var(--c-card);
      font-size: var(--fs-small);
      font-weight: 500;
      color: var(--c-text);
    }

    .summary-header:active {
      background: var(--c-bg);
    }

    .summary-icon {
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .summary-question-text {
      flex: 1;
      line-height: 1.4;
    }

    .summary-chevron {
      flex-shrink: 0;
      transition: transform var(--transition);
      color: var(--c-muted);
    }

    .summary-item.open .summary-chevron {
      transform: rotate(180deg);
    }

    .summary-body {
      display: none;
      padding: 0 16px 12px;
      font-size: var(--fs-small);
      color: var(--c-muted);
      line-height: 1.6;
      background: var(--c-card);
    }

    .summary-item.open .summary-body {
      display: block;
    }

    /* === STATS === */
    .stats-row {
      display: flex;
      justify-content: center;
      gap: 8px;
      font-size: var(--fs-small);
      color: var(--c-muted);
      flex-wrap: wrap;
      text-align: center;
    }

    .stats-row strong {
      color: var(--c-text);
    }

    /* === SOUND TOGGLE (inline in quiz header) === */
    .sound-toggle-inline {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid var(--c-border);
      background: var(--c-card);
      font-size: 1.15rem;
      cursor: pointer;
      touch-action: manipulation;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform var(--transition), border-color var(--transition);
      flex-shrink: 0;
    }

    .sound-toggle-inline:active {
      transform: scale(0.9);
      border-color: var(--c-primary);
    }

    /* === QUIZ HEADER BAR === */
    .quiz-header-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .quiz-header-info {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: var(--fs-small);
      color: var(--c-muted);
      flex: 1;
      min-width: 0;
    }

    /* === HEADER === */
    .app-header {
      text-align: center;
      padding: 8px 0;
    }

    .app-title {
      font-size: var(--fs-title);
      font-weight: 800;
      color: var(--c-text);
    }

    /* App title used as home button on non-start screens */
    .app-title--nav {
      cursor: pointer;
      text-align: center;
      padding: 6px 0 2px;
      opacity: 0.85;
      transition: opacity 0.15s ease;
    }
    .app-title--nav:hover,
    .app-title--nav:active {
      opacity: 1;
    }

    .app-subtitle {
      font-size: var(--fs-small);
      color: var(--c-muted);
      margin-top: 2px;
    }

    .greeting {
      font-size: var(--fs-small);
      color: var(--c-accent);
      font-weight: 600;
      margin-top: 8px;
    }

    /* === QUESTION === */
    .question-text {
      font-size: var(--fs-question);
      font-weight: 600;
      line-height: 1.5;
      color: var(--c-text);
    }

    /* === TOAST === */
    .toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--c-text);
      color: #FFFFFF;
      padding: 12px 24px;
      border-radius: var(--radius);
      font-size: var(--fs-small);
      font-weight: 600;
      z-index: 200;
      opacity: 0;
      transition: all 0.3s ease;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* === EMPTY STATE === */
    .empty-state {
      text-align: center;
      padding: 24px;
      color: var(--c-muted);
      font-size: var(--fs-small);
    }

    /* === SHARE TEXT FALLBACK === */
    .share-text-fallback {
      background: var(--c-card);
      border: 2px dashed var(--c-border);
      border-radius: var(--radius);
      padding: 16px;
      margin: 12px 0;
      font-size: var(--fs-small);
      white-space: pre-wrap;
      word-break: break-word;
      user-select: all;
      -webkit-user-select: all;
      color: var(--c-text);
      line-height: 1.6;
    }

    /* === SPACER === */
    .spacer { flex: 1; }
    .gap-sm { height: 8px; }
    .gap-md { height: 16px; }

    /* === SECTION LABEL === */
    .section-label {
      font-size: var(--fs-small);
      font-weight: 700;
      color: var(--c-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* === ANIMATIONS === */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.03); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    /* === CONFETTI CANVAS === */
    .confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 300;
    }

    /* === LINK-LIKE RESET BUTTON === */
    .link-btn {
      background: none;
      border: none;
      color: var(--c-muted);
      font-size: 0.75rem;
      font-family: var(--font);
      cursor: pointer;
      touch-action: manipulation;
      text-decoration: underline;
      padding: 4px;
    }

    .link-btn:active {
      color: var(--c-wrong);
    }

    .bottom-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding-top: 8px;
    }

    /* === BACK BUTTON === */
    .back-btn {
      background: none;
      border: none;
      font-size: 1.4rem;
      line-height: 1;
      padding: 4px 8px;
      cursor: pointer;
      touch-action: manipulation;
      color: var(--c-text);
      border-radius: var(--r-sm);
      flex-shrink: 0;
    }
    .back-btn:active {
      background: var(--c-surface);
    }

    /* === INTERRUPTED QUIZ CARD === */
    .interrupted-card {
      border-left: 4px solid var(--c-primary);
    }
    .interrupted-status {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--c-text);
    }
    .resume-btn {
      /* inherits .btn .btn--primary */
    }
    .new-quiz-btn {
      /* inherits .btn .btn--secondary */
    }
    .footer-info {
      text-align: center;
      font-size: 0.7rem;
      color: var(--c-muted);
      padding-top: 16px;
      padding-bottom: 8px;
      opacity: 0.7;
    }
    .footer-info span {
      margin: 0 2px;
    }

    /* Level-up suggestion banner */
    .levelup-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #FFF7ED 0%, #FFF3E0 100%);
      border: 1px solid var(--c-accent);
      border-radius: var(--radius);
      cursor: pointer;
    }
    .levelup-text {
      flex: 1;
      font-size: 0.9rem;
      color: var(--c-text);
      line-height: 1.4;
    }
    .levelup-dismiss {
      background: none;
      border: none;
      font-size: 1.1rem;
      color: var(--c-muted);
      cursor: pointer;
      padding: 4px 8px;
      margin-left: 8px;
      flex-shrink: 0;
    }
    .levelup-dismiss:active {
      opacity: 0.5;
    }

    /* Commander reset message */
    .commander-reset-msg {
      text-align: center;
      font-size: 0.95rem;
      color: var(--c-text);
      padding: 12px 16px;
      background: linear-gradient(135deg, #F0FFF4 0%, #E8F5E9 100%);
      border: 1px solid var(--c-correct);
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="screen-start" class="screen active"></div>
    <div id="screen-quiz" class="screen"></div>
    <div id="screen-feedback" class="screen"></div>
    <div id="screen-results" class="screen"></div>
  </div>
